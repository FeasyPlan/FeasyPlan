  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FeasyPlan — Planes de ejercicios para fisioterapeutas</title>
  <meta name="sb-key" content="{{SUPABASE_KEY}}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: 'DM Sans', sans-serif; background: #0F172A; color: #1a1d23; min-height: 100vh; }
    :root {
      --blue: #2563EB; --blue-light: #EFF6FF; --blue-mid: #93C5FD;
      --gray-50: #F7F8FA; --gray-100: #F1F3F7; --gray-200: #E4E8F0;
      --gray-400: #9CA3AF; --gray-600: #4B5563; --gray-900: #111827;
      --green: #059669; --green-light: #ECFDF5;
      --amber: #D97706; --amber-light: #FFFBEB;
      --red: #DC2626; --red-light: #FEF2F2;
      --white: #FFFFFF;
      --radius: 10px; --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.11);
    }

    /* ====== HEADER ====== */
    .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 32px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow); }
    .logo { font-size: 18px; font-weight: 700; color: var(--blue); letter-spacing: -0.5px; text-decoration: none; }
    .logo-img { height: 38px; }
    .logo span { color: var(--gray-900); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 400; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-outline { background: var(--white); color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-outline:hover { background: var(--gray-100); }
    .btn-ghost { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-ghost:hover { background: var(--gray-100); }
    .credits-badge { display: flex; align-items: center; gap: 5px; background: var(--amber-light); border: 1px solid #FDE68A; border-radius: 8px; padding: 5px 11px; font-size: 12px; font-weight: 600; color: var(--amber); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--blue-mid); transition: opacity 0.15s; }
    .avatar:hover { opacity: 0.85; }

    /* ====== HERO ====== */
    .hero { padding: 35px 24px; background: #0F172A; }
    .hero h1 { font-size: 30px; font-weight: 100; color: #fff; letter-spacing: -0.5px; line-height: 1.15; }
    .hero h1 span { color: #60A5FA; font-weight: 100; }

    /* ====== PANELS ====== */
    .panels-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 24px 10px; }
    .panel { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow); }
    .panel-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; color: var(--blue); text-transform: uppercase; margin-bottom: 10px; display:flex;align-items:center;gap:5px; }
    .physio-row { display: flex; align-items: center; gap: 10px; }
    .physio-avatar { width: 38px; height: 38px; border-radius: 10px; background: var(--blue-light); border: 1px solid var(--blue-mid); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--blue); flex-shrink: 0; }
    .physio-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .physio-clinic { font-size: 12px; color: var(--gray-400); }
    .btn-sm { background: var(--gray-100); border: none; border-radius: 7px; padding: 5px 10px; font-size: 12px; color: var(--gray-600); cursor: pointer; font-family: inherit; }
    .btn-sm:hover { background: var(--gray-200); }
    .input { border: 1px solid var(--gray-200); border-radius: 8px; padding: 8px 11px; font-size: 13px; color: var(--gray-900); background: var(--gray-50); outline: none; font-family: inherit; width: 100%; transition: all 0.15s; }
    .input:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
    .premium-lock { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--amber); background: var(--amber-light); border-radius: 6px; padding: 4px 8px; font-weight: 600; border: 1px solid #FDE68A; cursor: pointer; white-space: nowrap; }

    /* ====== MAIN BODY ====== */
    .main-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px 12px; min-height: calc(100vh - 200px); }
    .tabs { display: flex; gap: 2px; background: var(--gray-100); border-radius: 9px; padding: 3px; margin-bottom: 12px; border: 1px solid var(--gray-200); }
    .tab { flex: 1; padding: 6px 8px; border-radius: 7px; font-size: 12px; font-weight: 500; color: var(--gray-600); cursor: pointer; text-align: center; border: none; background: transparent; transition: all 0.15s; font-family: inherit; }
    .tab.active { background: var(--blue); color: #fff; box-shadow: var(--shadow); }
    .filter-sel { border: 1px solid var(--gray-200); border-radius: 7px; padding: 6px 8px; font-size: 12px; color: var(--gray-600); background: var(--white); cursor: pointer; outline: none; flex: 1; font-family: inherit; }
    .exercise-list { display: flex; flex-direction: column; gap: 6px; max-height: 270px; overflow-y: auto; padding-right: 2px; }
    .exercise-list::-webkit-scrollbar { width: 4px; }
    .exercise-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }
    .exercise-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px; transition: all 0.15s; }
    .exercise-card:hover { border-color: var(--blue-mid); background: var(--blue-light); }
    .exercise-name { font-size: 13px; font-weight: 600; color: var(--gray-900); line-height: 1.3; }
    .exercise-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tag { font-size: 10px; padding: 2px 6px; border-radius: 5px; font-weight: 500; background: var(--blue-light); color: var(--blue); }
    .btn-add { width: 28px; height: 28px; border-radius: 8px; background: var(--blue); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: all 0.15s; }
    .btn-add:hover { background: #1d4ed8; transform: scale(1.05); }
    .btn-add.added { background: var(--green); }

    /* ====== PLAN PANEL ====== */
    .plan-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-200); }
    .plan-icon { width: 34px; height: 34px; background: var(--blue-light); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .plan-title { font-size: 15px; font-weight: 700; color: var(--gray-900); }
    .plan-subtitle { font-size: 12px; color: var(--gray-400); }
    .section-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
    .sel-ex-card { background: var(--blue-light); border: 1.5px solid var(--blue-mid); border-radius: var(--radius); padding: 9px 11px; margin-bottom: 6px; position: relative; }
    .sel-ex-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--blue); border-radius: var(--radius) 0 0 var(--radius); }
    .sel-ex-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .sel-ex-name { font-size: 12px; font-weight: 700; color: var(--blue); }
    .btn-remove { width: 20px; height: 20px; border-radius: 5px; background: var(--red-light); color: var(--red); border: none; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .params-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .param-field { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 55px; }
    .param-label { font-size: 9px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; }
    .param-input { border: 1px solid var(--gray-200); border-radius: 6px; padding: 4px 6px; font-size: 12px; color: var(--gray-900); background: var(--white); outline: none; width: 100%; font-family: inherit; }
    .param-input:focus { border-color: var(--blue); }
    .empty-state { text-align: center; padding: 28px 16px; color: var(--gray-400); font-size: 12px; }

    /* ====== FOOTER ====== */
    .footer { background: #0F172A; border-top: 1px solid rgba(255,255,255,0.08); padding: 5px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: nowrap; gap: 6px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; height: 44px; box-sizing: border-box; }
    .footer-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.6px; }
    .btn-action { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); transition: all 0.15s; font-family: inherit; }
    .btn-action:hover { background: rgba(255,255,255,0.18); }
    .btn-action.blue { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }
    .btn-action.premium { background: var(--amber-light); color: var(--amber); border-color: #FDE68A; }

    /* ====== OVERLAY & POPUP ====== */
    .overlay { position: fixed; inset: 0; background: rgba(17,24,39,0.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); overflow: hidden; }
    .overlay.open { display: flex; overscroll-behavior: contain; }
    .popup { background: var(--white); border-radius: var(--radius-lg); padding: 26px; max-width: 390px; width: 100%; box-shadow: var(--shadow-md); animation: popIn 0.18s ease; }
    @keyframes popIn { from { opacity:0; transform:scale(0.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .popup-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 14px; }
    .popup-icon.blue { background: var(--blue-light); }
    .popup-icon.amber { background: var(--amber-light); }
    .popup-icon.green { background: var(--green-light); }
    .popup h2 { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 7px; }
    .popup p { font-size: 13px; color: var(--gray-600); line-height: 1.6; margin-bottom: 16px; }
    .popup-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; display: block; }
    .popup-btns { display: flex; flex-direction: column; gap: 7px; }
    .btn-full { width: 100%; padding: 11px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
    .btn-full.primary { background: var(--blue); color: #fff; }
    .btn-full.primary:hover { background: #1d4ed8; }
    .btn-full.amber-btn { background: #F59E0B; color: #fff; }
    .btn-full.amber-btn:hover { background: #D97706; }
    .btn-full.outline { background: var(--white); color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-full.outline:hover { background: var(--gray-100); }
    .popup-link { font-size: 12px; color: var(--gray-400); text-align: center; margin-top: 8px; cursor: pointer; }
    .popup-link span { color: var(--blue); font-weight: 500; }
    .plan-feature { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); padding: 4px 0; }
    .plan-feature-icon { color: var(--green); font-size: 14px; font-weight: 700; }
    .price-badge { background: var(--blue); color: #fff; border-radius: 8px; padding: 4px 11px; font-size: 13px; font-weight: 700; display: inline-block; margin-bottom: 12px; }
    .divider { height: 1px; background: var(--gray-200); margin: 12px 0; }
    .error-msg { background: var(--red-light); border: 1px solid #FCA5A5; border-radius: 7px; padding: 8px 11px; font-size: 12px; color: var(--red); margin-bottom: 10px; display: none; }

    /* ====== TOAST ====== */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--gray-900); color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 200; display: none; animation: toastIn 0.2s ease; max-width: 300px; }
    @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ====== LOADING ====== */
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ====== RESPONSIVE ====== */
    html, body { overflow-x: hidden; max-width: 100vw; }

    @media (max-width: 700px) {
      .panels-top, .main-body { grid-template-columns: 1fr; }
      .hero { padding: 10px 14px; }
      .hero > div { flex-wrap: nowrap; align-items: center; gap: 10px; }
      .hero h1 { font-size: 15px; line-height: 1.2; }
      #pricingCards { gap: 6px; flex-shrink: 0; }
      .panels-top { padding: 10px 10px 8px; background: transparent; }
      .main-body { padding: 0 10px 8px; }
      .header { padding: 0 12px; height: 52px; }
      .footer { padding: 4px 8px; flex-direction: row; align-items: center; gap: 3px; flex-wrap: nowrap; justify-content: space-around; height: 40px; }
      .footer-label { display: none; }
      .btn-action { padding: 4px 6px; font-size: 10px; white-space: nowrap; flex: 1; justify-content: center; }
      .footer > div:last-child { display: flex; flex-wrap: wrap; gap: 5px; }
      .btn-action { font-size: 11px; padding: 6px 9px; }
      /* Header móvil sin sesión: solo iconos */
      .header-right { gap: 4px; }
      .header-right .btn { padding: 5px 8px; font-size: 11px; }
      .avatar { width: 30px !important; height: 30px !important; flex-shrink: 0; }
      .logo-img { height: 28px; }
      .btn-mobile-icon { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--gray-200); background: transparent; cursor: pointer; font-size: 13px; }
      .btn-mobile-text { display: none; }
      .credits-badge { font-size: 10px; padding: 3px 7px; }
      .panel { padding: 11px 12px; }
      .panel-label { margin-bottom: 7px; }
    }
  </style>
</head>

  </div>

    <div class="panel-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Paciente</div>

<div class="main-body">
  <!-- Library -->

        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

<script>
// ============================================
// SUPABASE INIT
// ============================================
const SUPABASE_URL = 'https://hqofqaqlhknyxrazgwtc.supabase.co';
const SUPABASE_KEY = document.querySelector('meta[name="sb-key"]')?.content || '';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================
// EJERCICIOS (base de datos local inicial)
// ============================================
let EXERCISES = [];

const ZONAS = ["Todas","Piernas","Hombros","Cadera","Core","Tobillo","Cuello","General"];
const TIPOS = ["Todos","Estiramiento","Fuerza","Movilidad","Propiocepción","Cardio"];
const MATERIALES = ["Todos","Ninguno","Banda elástica","Pelota","Barra fija","Banco","Mancuernas","Step","Disco deslizante"];

// ============================================
// ESTADO GLOBAL
// ============================================
let state = {
  user: null,
  profile: null,
  credits: null,
  physio: { name:'', clinic:'', phone:'', email:'', logo:null, copyEmail:false },
  changingPassword: false,
  physioEditing: false,
  patient: null,
  patients: [], // lista cargada desde Supabase
  selectedExercises: [],
  activeTab: 'search',
  searchQuery: '',
  filterZona: 'Todas',
  filterTipo: 'Todos',
  filterMaterial: 'Todos',
  filterOwn: false,
  filterFavorites: false,
  favorites: new Set(),
  customExercises: [],
  savedPlans: [],
  templates: [],
  newExercise: { name:'', desc:'', zona:'Piernas', tipo:'Fuerza', material:'Ninguno', series:'3', reps:'10', duration:'', img:null },
};

// ============================================
// INIT — escuchar cambios de sesión
// ============================================
async function loadExercises() {
  try {
    const { data, error } = await sb
      .from('exercises')
      .select('*')
      .eq('active', true)
      .order('id', { ascending: true });

    if (error) throw error;

    EXERCISES = data.map(ex => ({
      id: ex.id,
      img: ex.img_url || '',
      name: ex.name,
      desc: ex.description || '',
      tags: ex.tags || [],
      zona: ex.zona || 'General',
      tipo: ex.tipo || 'Fuerza',
      material: ex.material || 'Ninguno',
      series: ex.default_series || '3',
      reps: ex.default_reps || '10',
      duration: ex.default_duration || '',
    }));

    console.log('Ejercicios cargados:', EXERCISES.length);
  } catch(e) {
    console.error('Error cargando ejercicios:', JSON.stringify(e), e.message, e.code);
    showToast('Error cargando ejercicios: ' + (e.message || e.code || 'revisa consola'));
  }
}

async function loadTemplates() {
  try {
    const { data } = await sb.from('templates').select('*').eq('active', true).order('id');
    state.templates = data || [];
  } catch(e) {
    console.error('Error cargando plantillas:', e);
  }
}

async function init() {
  // Detectar recuperación de contraseña ANTES de todo
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  const accessToken = hashParams.get('access_token');
  const tokenType = hashParams.get('type');
  const isRecovery = tokenType === 'recovery';

  if (isRecovery && accessToken) {
    // Limpiar hash de la URL
    window.history.replaceState(null, '', window.location.pathname);
    // Establecer sesión manualmente con el token
    const { data, error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: hashParams.get('refresh_token') || ''
    });
    if (!error && data.user) {
      state.user = data.user;
      await loadExercises();
      await loadTemplates();
      await loadUserData();
      render();
      setTimeout(() => showChangePasswordPopup(), 300);
      return;
    }
  }

  // Cargar ejercicios desde Supabase
  await loadExercises();

  // Cargar plantillas (acceso público)
  await loadTemplates();

  // Render inmediato para mostrar la UI sin sesión
  render();

  // Recuperar sesión guardada en el navegador
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    state.user = session.user;
    await loadUserData();
    render();

    // Detectar si viene de un enlace de recuperación de contraseña
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const type = params.get('type');
    if (type === 'recovery') {
      setTimeout(() => showChangePasswordPopup(), 600);
      window.history.replaceState(null, '', window.location.pathname);
    }
  }

  // Escuchar cambios futuros de sesión
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      state.user = null;
      state.profile = null;
      state.credits = null;
      render();
    } else if (event === 'PASSWORD_RECOVERY') {
      console.log('PASSWORD_RECOVERY event detected');
      state.user = session.user;
      await loadUserData();
      render();
      showChangePasswordPopup();
    } else if (session?.user && !state.user) {
      state.user = session.user;
      await loadUserData();
      render();
    }
  });
}

function showChangePasswordPopup() {
  state.changingPassword = true;
  showPopup(`
    <div class="popup-icon blue">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Nueva contraseña</h2>
    <p>Elige una contraseña segura para tu cuenta.</p>
    <div class="error-msg" id="pwError"></div>
    <div class="popup-form">
      <div>
        <label class="form-label">Nueva contraseña</label>
        <input class="input" type="password" id="newPw" placeholder="Mínimo 8 caracteres" style="background:white;">
      </div>
      <div>
        <label class="form-label">Confirmar contraseña</label>
        <input class="input" type="password" id="newPw2" placeholder="Repite la contraseña" style="background:white;" onkeydown="if(event.key==='Enter')doChangePassword()">
      </div>
    </div>
    <div class="popup-btns">
      <button class="btn-full primary" id="changePwBtn" onclick="doChangePassword()">Guardar contraseña</button>
    </div>
  `);
  setTimeout(() => document.getElementById('newPw')?.focus(), 100);
}

async function doChangePassword() {
  const pw = document.getElementById('newPw')?.value;
  const pw2 = document.getElementById('newPw2')?.value;
  const errEl = document.getElementById('pwError');
  const btn = document.getElementById('changePwBtn');

  if (!pw || pw.length < 8) { showError(errEl, 'La contraseña debe tener al menos 8 caracteres'); return; }
  if (pw !== pw2) { showError(errEl, 'Las contraseñas no coinciden'); return; }

  btn.textContent = 'Guardando...';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw });
  if (error) {
    btn.textContent = 'Guardar contraseña';
    btn.disabled = false;
    showError(errEl, 'Error al cambiar la contraseña. Inténtalo de nuevo.');
  } else {
    state.changingPassword = false;
    closePopup(true);
    showToast('Contraseña actualizada correctamente ✓');
    await loadUserData();
    render();
  }
}

async function loadUserData() {
  // Reset créditos si es un día nuevo
  await sb.rpc('reset_daily_credits_if_needed', { p_user_id: state.user.id });

  // Guardar datos que el usuario haya escrito antes de loguearse
  const pendingName = state.physio.name;
  const pendingClinic = state.physio.clinic;
  const pendingPhone = state.physio.phone;
  const pendingEmail = state.physio.email;
  const pendingLogo = state.physio.logo;

  // Cargar perfil
  const { data: profile } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
  state.profile = profile;
  if (profile) {
    // Conservar datos escritos antes de login si Supabase no tiene datos
    state.physio.name = profile.name || pendingName;
    state.physio.clinic = profile.clinic || pendingClinic;
    state.physio.phone = profile.phone || pendingPhone;
    state.physio.email = profile.email || pendingEmail;
    state.physio.logo = profile.logo_url || pendingLogo;
    state.physio.copyEmail = profile.copy_email || false;
    if (profile.ls_subscription_id) state.profile.ls_subscription_id = profile.ls_subscription_id;
    // Si había datos pendientes sin guardar, guardarlos automáticamente
    if (pendingName && !profile.name) {
      setTimeout(() => savePhysio(), 800);
    }
  }

  // Cargar créditos
  const { data: credits } = await sb.from('credits').select('*').eq('user_id', state.user.id).single();
  state.credits = credits;

  // Cargar pacientes
  const { data: patients } = await sb.from('patients').select('*').eq('user_id', state.user.id).order('name', { ascending: true });
  state.patients = patients || [];

  // Cargar favoritos
  const { data: favs } = await sb.from('favorites').select('exercise_id').eq('user_id', state.user.id);
  state.favorites = new Set((favs || []).map(f => f.exercise_id));

  // Cargar planes guardados
  const { data: savedPlans } = await sb.from('plans').select('*').eq('user_id', state.user.id).order('updated_at', { ascending: false });
  state.savedPlans = savedPlans || [];

  // Cargar ejercicios personalizados
  const { data: customEx } = await sb.from('exercises').select('*').eq('user_id', state.user.id).eq('is_custom', true);
  state.customExercises = (customEx || []).map(ex => ({
    id: 'custom_' + ex.id,
    dbId: ex.id,
    img: ex.img_url || '',
    name: ex.name,
    desc: ex.description || '',
    tags: ex.tags || [],
    zona: ex.zona || 'General',
    tipo: ex.tipo || 'Fuerza',
    material: ex.material || 'Ninguno',
    series: ex.default_series || '3',
    reps: ex.default_reps || '10',
    duration: ex.default_duration || '',
    isCustom: true,
  }));
}

// ============================================
// RENDER PRINCIPAL
// ============================================
function render() {
  // No re-renderizar si hay un popup de cambio de contraseña abierto
  if (state.changingPassword) return;
  renderHeader();
  renderPhysio();
  renderPlanHeader();
  renderTab();
  renderSelectedExercises();
  renderTabLabels();
  renderPricingCards();
}

        <div style="font-size:10px;font-weight:700;color:${isPremium?'#BFDBFE':'rgba(255,255,255,0.6)'};letter-spacing:0.6px;margin-bottom:4px;">PROFESSIONAL PLAN ${isPremium?'✓':''}</div>

function startPhysioEdit() {
  state.physioEditing = true;

}

function handleLogoUpload(input) {
  window._fromExercise = false;
  const file = input.files[0];
  if (!file) return;

  // Validaciones
  const validTypes = ['image/jpeg','image/png','image/webp','image/svg+xml','image/heic','image/heif','image/gif'];
  if (!validTypes.includes(file.type)) {
    showToast('Formato no válido. Usa JPG, PNG, WEBP o SVG');
    return;
  }
  if (file.size > 2000000) {
    showToast('La imagen es demasiado grande. Máximo 2MB');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    // Mostrar recortador
    if (window._fromExercise) {
      showLogoCropper(e.target.result, 'exercise');
    } else {
      showLogoCropper(e.target.result, 'logo');
    }
  };
  reader.readAsDataURL(file);
}

function showLogoCropper(src, target) {
  var cropTarget = target || 'logo';
  const label = cropTarget === 'exercise' ? 'Recorta la imagen del ejercicio' : 'Ajusta tu logo';

  showPopup(`
    <div style="font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">${label}</div>
    <p style="font-size:11px;color:var(--gray-500);margin-bottom:10px;">Arrastra para encuadrar · Desliza para hacer zoom</p>
    <div style="width:220px;height:220px;margin:0 auto 12px;overflow:hidden;border-radius:12px;border:2px solid var(--blue);background:var(--gray-100);position:relative;touch-action:none;cursor:grab;" id="cropBox">
      <img id="cropImg" src="${src}" style="position:absolute;user-select:none;transform-origin:top left;" draggable="false">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <input type="range" id="cropZoom" min="50" max="400" value="100" style="flex:1;accent-color:var(--blue);" oninput="cropSetZoom(parseInt(this.value))">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </div>
    <div class="popup-btns">
      <button class="btn-full primary" onclick="confirmCrop('${cropTarget}')">Usar esta zona</button>
      <button class="btn-full outline" onclick="cancelCrop()">Cancelar</button>
    </div>
  `);

  const box = document.getElementById('cropBox');
  const img = document.getElementById('cropImg');
  const SIZE = 220;
  let scale = 1, imgX = 0, imgY = 0;
  let dragging = false, lastX, lastY;

  function clamp() {
    // Limites: imagen no puede alejarse más allá del borde del recuadro
    const iw = img.naturalWidth * scale;
    const ih = img.naturalHeight * scale;
    // No dejar espacio en blanco: imagen debe cubrir el recuadro siempre
    imgX = Math.min(0, Math.max(SIZE - iw, imgX));
    imgY = Math.min(0, Math.max(SIZE - ih, imgY));
  }

  function applyTransform() {
    clamp();
    img.style.transform = `translate(${imgX}px, ${imgY}px) scale(${scale})`;
    img.style.transformOrigin = 'top left';
    img.style.width = img.naturalWidth + 'px';
    img.style.height = img.naturalHeight + 'px';
  }

  window.cropSetZoom = function(val) {
    const prevScale = scale;
    scale = val / 100;
    // Zoom hacia el centro del recuadro
    const cx = SIZE / 2, cy = SIZE / 2;
    imgX = cx - (cx - imgX) * (scale / prevScale);
    imgY = cy - (cy - imgY) * (scale / prevScale);
    applyTransform();
  };

  img.onload = () => {
    scale = Math.max(SIZE / img.naturalWidth, SIZE / img.naturalHeight);
    document.getElementById('cropZoom').min = Math.round(scale * 100);
    document.getElementById('cropZoom').value = Math.round(scale * 100);
    imgX = (SIZE - img.naturalWidth * scale) / 2;
    imgY = (SIZE - img.naturalHeight * scale) / 2;
    applyTransform();
  };

  // Mouse
  box.addEventListener('mousedown', e => {
    e.preventDefault(); dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    box.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    imgX += e.clientX - lastX; imgY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; box.style.cursor = 'grab'; });

  // Touch
  box.addEventListener('touchstart', e => {
    e.preventDefault(); dragging = true;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }, { passive: false });
  box.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!dragging) return;
    imgX += e.touches[0].clientX - lastX; imgY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }, { passive: false });
  box.addEventListener('touchend', () => { dragging = false; });
}

function updateCropZoom(val) {

function confirmCrop(target) {
  const box = document.getElementById('cropBox');
  const img = document.getElementById('cropImg');
  if (!box || !img) return;

  const canvas = document.createElement('canvas');
  canvas.width = 400;
  canvas.height = 400;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, 400, 400);

  const boxRect = box.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / imgRect.width;
  const scaleY = img.naturalHeight / imgRect.height;
  const sx = Math.max(0, (boxRect.left - imgRect.left) * scaleX);
  const sy = Math.max(0, (boxRect.top - imgRect.top) * scaleY);
  const sw = Math.min(boxRect.width * scaleX, img.naturalWidth - sx);
  const sh = Math.min(boxRect.height * scaleY, img.naturalHeight - sy);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, 400, 400);
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 400, 400);
  const cropped = canvas.toDataURL('image/jpeg', 0.85);
  document.body.style.overflow = '';
  closePopup();

  if (target === 'exercise') {
    state.newExercise.img = cropped;
    // Update preview without re-render
    const preview = document.getElementById('exImgPreview');
    if (preview) {
      preview.innerHTML = `<img src="${cropped}" style="width:80px;height:80px;object-fit:cover;border-radius:9px;border:1px solid var(--gray-200);" onclick="triggerImagePicker()">`;
    }
    showToast('Imagen añadida ✓');
  } else {
    state.physio.logo = cropped;
    renderPhysio();
    showToast('Logo actualizado ✓');
  }
}

async function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  const type = parts[0].split(':')[1];
  const binary = atob(parts[1]);
  const array = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
  return new Blob([array], { type });
}

async function uploadToStorage(bucket, path, base64) {
  const blob = await base64ToBlob(base64);
  const { data, error } = await sb.storage.from(bucket).upload(path, blob, {
    upsert: true,
    contentType: blob.type,
  });
  if (error) throw error;
  const { data: urlData } = sb.storage.from(bucket).getPublicUrl(path);
  return urlData.publicUrl;
}

async function savePhysio() {
  if (!state.user) {
    showLoginPopup('physio');
    return;

  state.physioEditing = false;

  try {
    let logoUrl = state.physio.logo;

      const path = state.user.id + '/logo.jpg';
      logoUrl = await uploadToStorage('logos', path, logoUrl);
      state.physio.logo = logoUrl; // Actualizar con la URL pública

    const { error } = await sb.from('profiles').upsert({
      id: state.user.id,
      name: state.physio.name,

      phone: state.physio.phone,
      email: state.user.email,
      logo_url: logoUrl || null,

}

    state.activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab)?.classList.add('active');

}

function getFilteredExercises() {
  let allExercises = state.filterOwn
    ? state.customExercises

  if (state.filterFavorites && state.favorites) {
    allExercises = allExercises.filter(ex => state.favorites.has(String(ex.id)));

  const q = state.searchQuery.toLowerCase();
  return allExercises.filter(ex =>
    (!q || ex.name.toLowerCase().includes(q) || ex.tags.some(t=>t.includes(q)))
    && (state.filterZona === 'Todas' || ex.zona === state.filterZona)
    && (state.filterTipo === 'Todos' || ex.tipo === state.filterTipo)

}

async function toggleFavorite(id) {
  if (!state.user) { showLoginPopup(); return; }
  if (!state.favorites) state.favorites = new Set();
  const sid = String(id);
  const isFav = state.favorites.has(sid);
  try {
    if (isFav) {
      await sb.from('favorites').delete().eq('user_id', state.user.id).eq('exercise_id', sid);
      state.favorites.delete(sid);
    } else {
      await sb.from('favorites').insert({ user_id: state.user.id, exercise_id: sid });
      state.favorites.add(sid);
    }
    // Update heart button in place
    const btn = document.querySelector('[data-fav-id="' + sid + '"]');
    if (btn) btn.outerHTML = heartBtn(sid);
    // Refresh filter buttons if needed
    if (state.filterFavorites) renderExerciseList();
    else renderTab();
  } catch(e) {
    showToast('Error al guardar favorito');
  }
}

function handleAddExercise(id) {
  // Normalizar id — puede ser string o número
  const numId = isNaN(id) ? id : (typeof id === 'string' ? parseInt(id) : id);
  const already = state.selectedExercises.some(s => String(s.id) === String(id));
  if (already) {
    state.selectedExercises = state.selectedExercises.filter(s => String(s.id) !== String(id));
    showToast('Ejercicio eliminado del plan');
  } else {
    // Buscar en biblioteca general y en personalizados
    const allEx = [...EXERCISES, ...state.customExercises];
    const ex = allEx.find(e => String(e.id) === String(id));
    if (!ex) { showToast('Ejercicio no encontrado'); return; }
    state.selectedExercises.push({
      ...ex,
      series: ex.series || '3',
      reps: ex.reps || '10',
      duration: ex.duration || '',
      notes: ''
    });
    showToast('Ejercicio añadido ✓');
    // En móvil, scroll suave al plan solo con el primer ejercicio
    if (state.selectedExercises.length === 1 && window.innerWidth <= 700) {
      setTimeout(() => {
        const planPanel = document.getElementById('planPanel');
        if (planPanel) {
          // Scroll más lento y suave
          const targetY = planPanel.getBoundingClientRect().top + window.scrollY - 10;
          window.scrollTo({ top: targetY, behavior: 'smooth' });
        }
      }, 500);
    }
  }
  // Solo actualizar botones sin rerenderizar lista (evita scroll reset)
  updateAddButtons();
  renderSelectedExercises();
}

function updateAddButtons() {
  document.querySelectorAll('[data-exercise-id]').forEach(btn => {
    const id = btn.getAttribute('data-exercise-id');
    const added = state.selectedExercises.some(s => String(s.id) === String(id));
    btn.textContent = added ? '✓' : '+';
    btn.className = 'btn-add ' + (added ? 'added' : '');

      <div onmousedown="event.preventDefault();selectPatient(${idx})" style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;flex-direction:column;gap:2px;" onmouseover="this.style.background='var(--blue-light)'" onmouseout="this.style.background=''">

      </div>
    `).join('');
    dropdown.style.display = 'block';
  }
}

async function saveEditedPatient() {
  const name = document.getElementById('ptName').value.trim();
  if (!name) { showToast('El nombre es obligatorio'); return; }
  state.patient = {
    ...state.patient,
    name,
    age: document.getElementById('ptAge').value,
    phone: document.getElementById('ptPhone').value,
    email: document.getElementById('ptEmail').value,
    notes: document.getElementById('ptNotes').value,
  };
  // Guardar en Supabase si tiene dbId
  if (state.patient.dbId && state.user) {
    await sb.from('patients').update({
      name: state.patient.name,
      age: state.patient.age ? parseInt(state.patient.age) : null,
      phone: state.patient.phone || null,
      email: state.patient.email || null,
      notes: state.patient.notes || null,
    }).eq('id', state.patient.dbId);
    // Actualizar lista local
    const idx = state.patients.findIndex(p => p.id === state.patient.dbId);
    if (idx >= 0) state.patients[idx] = { ...state.patients[idx], ...state.patient, id: state.patient.dbId };
  }
  closePopup();
  renderPatientDisplay();
  showToast('Paciente actualizado ✓');
}

function clearPatient() {
  state.patient = null;
  document.getElementById('patientDisplay').innerHTML = '';
  document.getElementById('patientSearch').value = '';
  var sb2 = document.getElementById('saveClientBtn');
  if (sb2) sb2.style.display = 'none';
}

async function doSaveClient() {
  if (!state.user) { showLoginPopup(); return; }
  if (!state.profile?.is_premium) { showPayPopup(); return; }
  if (!state.patient) return;
  try {
    const payload = {
      user_id: state.user.id,
      name: state.patient.name,
      age: state.patient.age ? parseInt(state.patient.age) : null,
      phone: state.patient.phone || null,
      email: state.patient.email || null,
      notes: state.patient.notes || null,
    };
    let result;
    if (state.patient.dbId) {
      result = await sb.from('patients').update(payload).eq('id', state.patient.dbId);
    } else {
      result = await sb.from('patients').insert(payload).select().single();
      if (result.data) state.patient.dbId = result.data.id;
    }
    // Recargar lista de pacientes
    const { data } = await sb.from('patients').select('*').eq('user_id', state.user.id).order('name');
    state.patients = data || [];
    showToast('Cliente guardado ✓');
    var saveBtn = document.getElementById('saveClientBtn');
    if (saveBtn) saveBtn.style.display = 'none';
  } catch(e) {
    showToast('Error al guardar el cliente');
  }
}

async function handleAction(type) {
  if (!state.user) { showLoginPopup(); return; }
  if (type === 'savePlan') {
    if (!state.profile?.is_premium) { showPayPopup(); return; }
    showSavePlanPopup(); return;
  }
  if (type === 'saveClient') { doSaveClient(); return; }
  if (!state.selectedExercises.length) { showToast('Añade ejercicios al plan primero'); return; }
  if (!state.patient || !state.patient.name) {
    showPopup(`
      <div class="popup-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2>Falta el paciente</h2>
      <p>Añade los datos del paciente antes de enviar o descargar el plan. El documento debe ir personalizado con su nombre.</p>
      <div class="popup-btns">
        <button class="btn-full primary" onclick="closePopup();handleNewPatient()">Añadir paciente</button>
        <button class="btn-full outline" onclick="closePopup()">Cancelar</button>
      </div>
    `);
    return;
  }

  // Comprobar créditos
  await sb.rpc('reset_daily_credits_if_needed', { p_user_id: state.user.id });
  const { data: cr } = await sb.from('credits').select('*').eq('user_id', state.user.id).single();
  state.credits = cr;

  if (cr.daily_used >= cr.daily_limit && !state.profile?.is_premium) {
    showCreditPopup(); return;
  }

  // Consumir crédito para todas las acciones (no premium)
  async function consumeCredit() {
    if (!state.profile?.is_premium) {
      await sb.from('credits').update({
        daily_used: cr.daily_used + 1,
        monthly_used: cr.monthly_used + 1
      }).eq('user_id', state.user.id);
      state.credits.daily_used++;
      renderHeader();
    }
  }

  if (type === 'download') {
    await generatePDF();
    await consumeCredit();
  } else if (type === 'email') {
    await consumeCredit();
    sendEmail();
  } else if (type === 'whatsapp') {
    await consumeCredit();
    sendWhatsApp();
  }
}

// ============================================
// GENERACIÓN DE PDF
// ============================================
function generatePDFDoc() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = 210;
  const marginL = 14;
  const marginR = 14;
  const contentW = pageW - marginL - marginR;
  const isPremium = state.profile?.is_premium || false;

  // ── COLORES ──
  const C = {
    blue:     [37,  99,  235],
    blueSoft: [239, 246, 255],
    dark:     [17,  24,  39],
    mid:      [75,  85,  99],
    light:    [156, 163, 175],
    border:   [228, 232, 240],
    bg:       [247, 248, 250],
    white:    [255, 255, 255],
  };

  function setFill(c)   { doc.setFillColor(c[0], c[1], c[2]); }
  function setStroke(c) { doc.setDrawColor(c[0], c[1], c[2]); }
  function setColor(c)  { doc.setTextColor(c[0], c[1], c[2]); }

  // ── CABECERA ──
  // Franja superior azul fina
  setFill(C.blue);
  doc.rect(0, 0, pageW, 4, 'F');

  let y = 14;

  // Logo fisio (solo Premium, esquina superior derecha)
  const logoSize = 22;
  if (isPremium && state.physio.logo) {
    try {
      const fmt = state.physio.logo.includes('image/png') ? 'PNG' : 'JPEG';
      // Dibujar sobre fondo blanco
      const logoCanvas = document.createElement('canvas');
      logoCanvas.width = 400; logoCanvas.height = 400;
      const lCtx = logoCanvas.getContext('2d');
      lCtx.fillStyle = '#FFFFFF';
      lCtx.fillRect(0, 0, 400, 400);
      const logoImg = new Image();
      logoImg.src = state.physio.logo;
      lCtx.drawImage(logoImg, 0, 0, 400, 400);
      const cleanLogo = logoCanvas.toDataURL('image/jpeg', 0.9);
      doc.addImage(cleanLogo, 'JPEG', pageW - marginR - logoSize, 6, logoSize, logoSize);
    } catch(e) { /* skip */ }
  }

  // Fisio (izquierda) | Paciente (derecha)
  const colMid = pageW / 2;

  // Fisio
  if (state.physio.name) {
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    setColor(C.blue);
    doc.text('FISIOTERAPEUTA', marginL, y);
    y += 4.5;
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    setColor(C.dark);
    doc.text(state.physio.name, marginL, y);
    y += 5;
    if (state.physio.clinic) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      setColor(C.mid);
      doc.text(state.physio.clinic, marginL, y);
      y += 4;
    }
    if (state.physio.phone) {
      doc.setFontSize(8.5);
      doc.setFont('helvetica', 'normal');
      setColor(C.light);
      doc.text(state.physio.phone, marginL, y);
      y += 4;
    }
    if (state.physio.email) {
      doc.setFontSize(8.5);
      doc.setFont('helvetica', 'normal');
      setColor(C.light);
      doc.text(state.physio.email, marginL, y);
      y += 4;
    }
  }

  // Paciente (columna derecha, alineado arriba junto al fisio)
  if (state.patient) {
    let yP = 14;
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    setColor(C.blue);
    doc.text('PACIENTE', colMid, yP);
    yP += 4.5;
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    setColor(C.dark);
    doc.text(state.patient.name, colMid, yP);
    yP += 5;
    if (state.patient.age) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      setColor(C.mid);
      doc.text(state.patient.age + ' años', colMid, yP);
      yP += 4;
    }
    if (state.patient.notes) {
      doc.setFontSize(8.5);
      setColor(C.light);
      const pNotes = doc.splitTextToSize(state.patient.notes, contentW / 2 - 4);
      doc.text(pNotes, colMid, yP);
    }
  }

  // Fecha dentro de la franja azul (blanco sobre azul, derecha)
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(255, 255, 255);
  doc.text(new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'long', year:'numeric'}), pageW - marginR, 2.5, { align: 'right' });

  // Línea separadora cabecera
  y = Math.max(y, 36) + 4;
  setStroke(C.border);
  doc.setLineWidth(0.4);
  doc.line(marginL, y, pageW - marginR, y);
  y += 6;

  // ── NOTAS GENERALES ──
  const notes = document.getElementById('planNotes').value.trim();
  if (notes) {
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    setColor(C.blue);
    doc.text('NOTAS GENERALES', marginL, y);
    y += 4;
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    setColor(C.mid);
    const noteLines = doc.splitTextToSize(notes, contentW);
    doc.text(noteLines, marginL, y);
    y += noteLines.length * 4.5 + 5;
    setStroke(C.border);
    doc.line(marginL, y, pageW - marginR, y);
    y += 6;
  }

  // ── TÍTULO SECCIÓN EJERCICIOS ──
  doc.setFontSize(7);
  doc.setFont('helvetica', 'bold');
  setColor(C.blue);
  doc.text('PLAN DE EJERCICIOS', marginL, y);
  y += 6;

  // ── CALCULAR ALTURA POR EJERCICIO ──
  // Layout: imagen 32x32mm a la izquierda, texto a la derecha
  const imgW = 32;
  const imgH = 32;
  const textX = marginL + imgW + 6;
  const textW = contentW - imgW - 6;
  const exSpacing = 4; // espacio entre ejercicios

  // ── EJERCICIOS ──
  state.selectedExercises.forEach((ex, i) => {
    // Calcular altura dinámica del bloque
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    const nameLines = doc.splitTextToSize(ex.name, textW);

    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    const descLines = doc.splitTextToSize(ex.desc, textW);

    const blockH = Math.max(imgH, nameLines.length * 5.5 + descLines.length * 4.2 + 14) + 4;

    // Nueva página si no cabe
    if (y + blockH > 278) {
      // Footer en página actual
      drawFooter(doc, pageW, isPremium);
      doc.addPage();
      // Franja azul nueva página
      setFill(C.blue);
      doc.rect(0, 0, pageW, 4, 'F');
      y = 14;
    }

    // Fondo alterno suave
    if (i % 2 === 0) {
      setFill(C.bg);
      doc.roundedRect(marginL, y - 2, contentW, blockH, 2, 2, 'F');
    }

    // Número del ejercicio
    setFill(C.blue);
    doc.circle(marginL + 3.5, y + 3, 3.5, 'F');
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    setColor(C.white);
    doc.text(String(i + 1), marginL + 3.5, y + 4.3, { align: 'center' });

    // Imagen del ejercicio — usar base64 precargada o inline
    const imgSrc = ex.imgBase64 || (ex.img && ex.img.startsWith('data:') ? ex.img : null);
    if (imgSrc) {
      try {
        const fmt = imgSrc.includes('image/png') ? 'PNG' : 'JPEG';
        doc.addImage(imgSrc, fmt, marginL, y + 1, imgW, imgH - 2);
      } catch(e) {
        setFill(C.border);
        doc.roundedRect(marginL, y + 2, imgW, imgH - 4, 2, 2, 'F');
      }
    } else {
      setFill(C.border);
      doc.roundedRect(marginL, y + 2, imgW, imgH - 4, 2, 2, 'F');
    }

    // Nombre
    let tyLocal = y + 4;
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    setColor(C.dark);
    doc.text(nameLines, textX, tyLocal);
    tyLocal += nameLines.length * 5.5;

    // Descripción
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    setColor(C.mid);
    doc.text(descLines, textX, tyLocal);
    tyLocal += descLines.length * 4.2 + 3;

    // Parámetros — píldoras
    const params = [];
    if (ex.series)   params.push('Series: ' + ex.series);
    if (ex.reps)     params.push('Reps: ' + ex.reps);
    if (ex.duration) params.push('Dur: ' + ex.duration + 's');

    let px = textX;
    params.forEach(p => {
      const pw = doc.getTextWidth(p) + 6;
      setFill(C.blueSoft);
      doc.roundedRect(px, tyLocal - 3, pw, 5.5, 1.5, 1.5, 'F');
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      setColor(C.blue);
      doc.text(p, px + 3, tyLocal + 1);
      px += pw + 3;
    });
    tyLocal += 7;

    // Notas del ejercicio
    if (ex.notes) {
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'italic');
      setColor(C.light);
      doc.text('Nota: ' + ex.notes, textX, tyLocal);
      tyLocal += 4.5;
    }

    // Línea separadora entre ejercicios (solo si no es el último)
    if (i < state.selectedExercises.length - 1) {
      setStroke(C.border);
      doc.setLineWidth(0.2);
      doc.line(marginL, y + blockH - 1, pageW - marginR, y + blockH - 1);
    }

    y += blockH + exSpacing;
  });

  // Footer última página
  drawFooter(doc, pageW, isPremium);

  return doc;
}

async function preloadExerciseImages() {
  const promises = state.selectedExercises.map(ex => {
    return new Promise(resolve => {
      const src = ex.imgBase64 || ex.img;
      if (!src) { resolve(); return; }

      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          // Dibujar sobre fondo blanco para eliminar transparencia/negro
          const canvas = document.createElement('canvas');
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          ex.imgBase64 = canvas.toDataURL('image/jpeg', 0.85);
        } catch(e) { /* CORS error, skip */ }
        resolve();
      };
      img.onerror = () => resolve();
      img.src = src;
    });
  });
  await Promise.all(promises);
}

async function generatePDF() {
  await preloadExerciseImages();
  const doc = generatePDFDoc();
  const filename = 'plan-' + (state.patient?.name || 'paciente').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.pdf';
  doc.save(filename);
  showToast('PDF descargado ✓');
}

function drawFooter(doc, pageW, isPremium) {
  if (!isPremium) {
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(180, 180, 180);
    doc.text('Generado con FeasyPlan · feasyplan.com', pageW / 2, 290, { align: 'center' });
  }
  // Franja azul inferior
  doc.setFillColor(37, 99, 235);
  doc.rect(0, 293, pageW, 4, 'F');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');

  if (!email || !pass) { showError(errEl, 'Completa todos los campos'); return; }

  btn.innerHTML = '<span class="loading-spinner"></span> Entrando...';
  btn.disabled = true;

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

    if (error) {
      btn.innerHTML = 'Iniciar sesión';
      btn.disabled = false;
      showError(errEl, 'Email o contraseña incorrectos');
      return;
    }

    if (data?.user) {
      state.user = data.user;
      await loadUserData();
      closePopup();
      render();
      showToast('¡Bienvenido de nuevo! 👋');
    }
  } catch(e) {
    btn.innerHTML = 'Iniciar sesión';
    btn.disabled = false;
    showError(errEl, 'Error de conexión. Inténtalo de nuevo.');
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const btn = document.getElementById('regBtn');
  const errEl = document.getElementById('regError');

  if (!name || !email || !pass) { showError(errEl, 'Completa todos los campos'); return; }
  if (pass.length < 6) { showError(errEl, 'La contraseña debe tener al menos 6 caracteres'); return; }

  btn.innerHTML = '<span class="loading-spinner"></span> Creando cuenta...';
  btn.disabled = true;

  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { name }, emailRedirectTo: window.location.href }
  });

  if (error) {
    btn.innerHTML = 'Crear cuenta gratis';
    btn.disabled = false;
    showError(errEl, error.message.includes('already') ? 'Este email ya está registrado' : 'Error al crear la cuenta');
    return;

    const res = await fetch('https://hqofqaqlhknyxrazgwtc.supabase.co/functions/v1/cancel-subscription', {
      method: 'POST',

function triggerImagePicker() {
  window._fromExercise = true;
  // Crear un input nuevo cada vez — el único método fiable en iOS Safari
  const old = document.getElementById('exImgInputTemp');
  if (old) old.remove();

  const input = document.createElement('input');
  input.type = 'file';
  input.id = 'exImgInputTemp';
  input.accept = 'image/*,.heic,.heif';
  input.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
  input.onchange = function() { handleExerciseImageUpload(this); };
  document.body.appendChild(input);

}

function handleExerciseImageUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const validTypes = ['image/jpeg','image/png','image/webp','image/heic','image/heif','image/gif'];
  if (!validTypes.includes(file.type) && !file.name.match(/\.(heic|heif|jpg|jpeg|png|webp|gif)$/i)) {
    showToast('Formato no válido. Usa JPG, PNG, WEBP o HEIC');
    return;
  }
  if (file.size > 15000000) {
    const mb = (file.size / 1000000).toFixed(1);
    showToast('La imagen pesa ' + mb + 'MB. Máximo 15MB. Comprime la foto e inténtalo de nuevo.');
    return;
  }

  showToast('Procesando imagen...');
  const reader = new FileReader();
  reader.onerror = () => showToast('Error al leer el archivo. Inténtalo con otra imagen.');
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    const img = new Image();
    img.onerror = () => showToast('No se pudo cargar la imagen. Prueba con otro formato.');
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        const ratio = Math.min(MAX/w, MAX/h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      state.newExercise.img = canvas.toDataURL('image/jpeg', 0.85);
      // Update preview without full re-render
      const preview = document.getElementById('exImgPreview');
      if (preview) {
        preview.innerHTML = `<img src="${state.newExercise.img}" style="width:80px;height:80px;object-fit:cover;border-radius:9px;border:1px solid var(--gray-200);" onclick="document.getElementById('exImgInput').click()">`;
      }
      showToast('Imagen cargada ✓');
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

async function saveCustomExercise() {
  const ex = state.newExercise;
  if (!ex.name.trim()) { showToast('Añade un nombre al ejercicio'); return; }

  try {
    const maxId = Math.max(...EXERCISES.map(e => typeof e.id === 'number' ? e.id : 0), ...state.customExercises.map(e => parseInt(e.dbId) || 0), 50);

    // Subir imagen a Storage si es base64
    let imgUrl = ex.img || null;
    if (imgUrl && imgUrl.startsWith('data:')) {
      showToast('Subiendo imagen...');
      const path = state.user.id + '/' + Date.now() + '.jpg';
      imgUrl = await uploadToStorage('custom-exercises', path, imgUrl);
    }

    const payload = {
      id: maxId + 1,
      user_id: state.user.id,
      is_custom: true,
      name: ex.name.trim(),
      description: ex.desc,
      tags: ex.name.toLowerCase().split(' ').slice(0,2),
      zona: ex.zona,
      tipo: ex.tipo,
      material: ex.material,
      default_series: ex.series,
      default_reps: ex.reps,
      default_duration: ex.duration,
      img_url: imgUrl,
      active: true,
    };

    const { data, error } = await sb.from('exercises').insert(payload).select().single();
    if (error) throw error;

    // Añadir a la lista local (usar URL de Storage, no base64)
    state.customExercises.push({
      id: 'custom_' + data.id,
      dbId: data.id,
      img: data.img_url || '',
      name: data.name,
      desc: data.description || '',
      tags: data.tags || [],
      zona: data.zona,
      tipo: data.tipo,
      material: data.material,
      series: data.default_series,
      reps: data.default_reps,
      duration: data.default_duration,
      isCustom: true,
    });

    // Reset form
    state.newExercise = { name:'', desc:'', zona:'Piernas', tipo:'Fuerza', material:'Ninguno', series:'3', reps:'10', duration:'', img:null };
    showToast('Ejercicio guardado ✓');
    state.filterOwn = true;
    switchTab('search');
  } catch(e) {
    console.error(e);
    showToast('Error al guardar el ejercicio');
  }
}

    await sb.from('exercises').delete().eq('id', dbId).eq('user_id', state.user.id);
    state.customExercises = state.customExercises.filter(e => e.id !== id);
    state.selectedExercises = state.selectedExercises.filter(e => e.id !== id);

  const allEx = [...EXERCISES, ...state.customExercises];
  state.selectedExercises = (t.exercises || []).map(te => {

      ...(found || te),
      series: te.series || '3',
      reps: te.reps || '10',
      duration: te.duration || '',

  renderSelectedExercises();
  switchTab('search');
  showToast('Plantilla cargada: ' + t.name + ' ✓');

      window.scrollTo({ top: targetY, behavior: 'smooth' });

}

      name,
      patient_name: null,
      general_notes: document.getElementById('planNotes').value,
      exercises: exercisesToSave,
      updated_at: new Date().toISOString(),
    };
    const { data, error } = await sb.from('plans').insert(payload).select().single();
    if (error) throw error;
    state.savedPlans.unshift(data);
    closePopup();
    showToast('Plan guardado ✓');
  } catch(e) {
    showToast('Error al guardar el plan');
  }
}

async function loadPlan(id) {
  // Find plan by string comparison (id can be int or string)
  const plan = state.savedPlans.find(p => String(p.id) === String(id));
  if (!plan) {
    console.error('Plan no encontrado:', id, state.savedPlans.map(p=>p.id));
    showToast('Error: plan no encontrado');
    return;
  }

  // Enrich exercises with full data from library
  const allEx = [...EXERCISES, ...state.customExercises];
  state.selectedExercises = (plan.exercises || []).map(saved => {
    const found = allEx.find(e => String(e.id) === String(saved.id));
    return {
      ...(found || saved),
      series: saved.series || '3',
      reps: saved.reps || '10',
      duration: saved.duration || '',
      notes: saved.notes || '',
    };
  });

  // Set notes
  const notesEl = document.getElementById('planNotes');
  if (notesEl) notesEl.value = plan.general_notes || '';

  // Switch to search tab first, then render
  switchTab('search');

  // Render after tab switch
  setTimeout(() => {
    updateAddButtons();
    renderSelectedExercises();
  }, 50);

  showToast('Plan cargado: ' + plan.name + ' ✓');
  // Scroll suave al plan de ejercicios
  setTimeout(() => {
    const planPanel = document.getElementById('planPanel');
    if (planPanel) {
      const targetY = planPanel.getBoundingClientRect().top + window.scrollY - 10;
      window.scrollTo({ top: targetY, behavior: 'smooth' });
    }
  }, 400);
}

async function deletePlan(id) {

async function doSendWhatsApp(url) {
  closePopup();
  showToast('Generando PDF...');
  // Precargar imágenes antes de generar
  await preloadExerciseImages();
  var doc = generatePDFDoc();
  var filename = 'plan-' + ((state.patient && state.patient.name) ? state.patient.name.replace(/[^a-z0-9]/gi,'-').toLowerCase() : 'paciente') + '.pdf';
  var blob = doc.output('blob');
  var blobUrl = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = blobUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    document.body.removeChild(a);
    URL.revokeObjectURL(blobUrl);
    window.open(url, '_blank');
  }, 800);
}

async function sendEmail() {
  if (!state.patient || !state.patient.email) {
    showToast('Añade el email del paciente primero');
    return;
  }
  if (!state.selectedExercises.length) {
    showToast('Añade ejercicios al plan primero');
    return;
  }

  showToast('Generando y enviando PDF...');

  try {
    // Generar PDF en base64
    const pdfBase64 = await generatePDFBase64();

    // Llamar a la Edge Function
    const res = await fetch(
      'https://hqofqaqlhknyxrazgwtc.supabase.co/functions/v1/send-plan-email',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_KEY,
        },
        body: JSON.stringify({
          to: state.patient.email,
          cc: (state.physio.copyEmail && state.physio.email) ? state.physio.email : null,
          subject: 'Tu plan de ejercicios - ' + state.patient.name,
          patientName: state.patient.name,
          physioName: state.physio.name || 'Tu fisioterapeuta',
          physioClinic: state.physio.clinic || '',
          notes: document.getElementById('planNotes').value.trim(),
          exercises: state.selectedExercises,
          pdfBase64: pdfBase64,
        }),
      }
    );

    const data = await res.json();
    if (data.ok) {
      showToast('Email enviado correctamente a ' + state.patient.email + ' ✓');
    } else {
      showToast('Error al enviar: ' + (data.error || 'inténtalo de nuevo'));
    }
  } catch(e) {
    showToast('Error de conexión al enviar el email');
  }
}

async function generatePDFBase64() {
  await preloadExerciseImages();
  const doc = generatePDFDoc();
  return doc.output('datauristring').split(',')[1];
}

// HELPERS
// ============================================
function showPopup(html) {
  document.getElementById('popup').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePopup(force) {
  if (state.changingPassword && !force) return; // No cerrar si estamos cambiando contraseña
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closePopup();
  // closePopup ya gestiona el flag changingPassword internamente
}

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3000);
}
